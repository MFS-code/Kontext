---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: agents.kontext.dev
spec:
  group: kontext.dev
  names:
    kind: Agent
    listKind: AgentList
    plural: agents
    shortNames:
    - ag
    singular: agent
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.mode
      name: Mode
      type: string
    - jsonPath: .status.currentRunName
      name: CurrentRun
      type: string
    - jsonPath: .status.restarts
      name: Restarts
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Agent is the Schema for the agents API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AgentSpec defines the desired state of Agent.
            properties:
              backoff:
                description: BackoffSpec controls Service-mode re-cast delays.
                properties:
                  initialSeconds:
                    format: int32
                    type: integer
                  maxSeconds:
                    format: int32
                    type: integer
                type: object
              budget:
                description: BudgetSpec limits resource consumption for an agent run.
                properties:
                  dollars:
                    type: number
                  tokens:
                    format: int32
                    type: integer
                  wallclock:
                    type: string
                type: object
                x-kubernetes-validations:
                - message: wallclock must be empty or a positive duration
                  rule: '!has(self.wallclock) || self.wallclock.size() == 0 || duration(self.wallclock)
                    > duration(''0s'')'
              env:
                items:
                  description: EnvVar is a name/value or Secret-backed value injected
                    into the runtime Pod.
                  properties:
                    name:
                      type: string
                    value:
                      type: string
                    valueFrom:
                      properties:
                        secretKeyRef:
                          properties:
                            key:
                              minLength: 1
                              type: string
                            name:
                              minLength: 1
                              type: string
                          required:
                          - key
                          - name
                          type: object
                      required:
                      - secretKeyRef
                      type: object
                  required:
                  - name
                  type: object
                  x-kubernetes-validations:
                  - message: exactly one of value or valueFrom must be configured
                    rule: has(self.value) != has(self.valueFrom)
                type: array
              goal:
                minLength: 1
                type: string
              goalTemplate:
                minLength: 1
                type: string
              knowledgeConfigMapRef:
                description: ConfigMapRef references a Kubernetes ConfigMap mounted
                  into the runtime Pod.
                properties:
                  name:
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              mode:
                description: AgentMode defines how an Agent behaves.
                enum:
                - Task
                - Service
                - Scheduled
                type: string
              model:
                minLength: 1
                type: string
              provider:
                type: string
              runtime:
                description: RuntimeSpec describes the container image implementing
                  the runtime contract.
                properties:
                  args:
                    items:
                      type: string
                    type: array
                  command:
                    items:
                      type: string
                    type: array
                  image:
                    minLength: 1
                    type: string
                  result:
                    description: RuntimeResultSpec opts an existing runtime image
                      into result capture.
                    properties:
                      format:
                        description: ResultFormat identifies how the reporter extracts
                          a result from stdout.
                        enum:
                        - LastLine
                        - KontextEnvelope
                        type: string
                      source:
                        description: ResultSource identifies the stream used to extract
                          a runtime result.
                        enum:
                        - Stdout
                        type: string
                    required:
                    - format
                    - source
                    type: object
                  securityContext:
                    description: |-
                      RuntimeSecurityContext exposes the portable container hardening fields used
                      by Kontext examples without allowing privilege grants through this API.
                    properties:
                      allowPrivilegeEscalation:
                        type: boolean
                      capabilities:
                        properties:
                          drop:
                            items:
                              type: string
                            type: array
                        type: object
                      readOnlyRootFilesystem:
                        type: boolean
                      runAsNonRoot:
                        type: boolean
                      seccompProfile:
                        properties:
                          localhostProfile:
                            type: string
                          type:
                            enum:
                            - RuntimeDefault
                            - Localhost
                            type: string
                        required:
                        - type
                        type: object
                        x-kubernetes-validations:
                        - message: localhostProfile is required as a safe relative
                            path only for Localhost seccomp profiles
                          rule: 'self.type == ''Localhost'' ? has(self.localhostProfile)
                            && self.localhostProfile.size() > 0 && !self.localhostProfile.startsWith(''/'')
                            && !self.localhostProfile.contains(''..'') : !has(self.localhostProfile)'
                    type: object
                    x-kubernetes-validations:
                    - message: allowPrivilegeEscalation may only be false
                      rule: '!has(self.allowPrivilegeEscalation) || self.allowPrivilegeEscalation
                        == false'
                    - message: runAsNonRoot may only be true
                      rule: '!has(self.runAsNonRoot) || self.runAsNonRoot == true'
                required:
                - image
                type: object
                x-kubernetes-validations:
                - message: runtime.command must provide a non-empty executable when
                    runtime.result is configured
                  rule: '!has(self.result) || (has(self.command) && size(self.command)
                    > 0 && size(self.command[0]) > 0)'
              schedule:
                type: string
              secretRef:
                description: SecretRef references a Kubernetes Secret with provider
                  credentials.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              serviceAccountName:
                type: string
              tools:
                items:
                  type: string
                type: array
            required:
            - mode
            - model
            - runtime
            type: object
            x-kubernetes-validations:
            - message: Task agents require exactly one of goal or goalTemplate; Service
                and Scheduled agents require goal and forbid goalTemplate
              rule: 'self.mode == ''Task'' ? has(self.goal) != has(self.goalTemplate)
                : has(self.goal) && !has(self.goalTemplate)'
            - message: schedule is only valid for Scheduled agents
              rule: self.mode == 'Scheduled' || !has(self.schedule)
            - message: backoff is only valid for Service agents
              rule: self.mode == 'Service' || !has(self.backoff)
          status:
            description: AgentStatus defines the observed state of Agent.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              currentRunName:
                type: string
              lastRunName:
                type: string
              observedGeneration:
                format: int64
                type: integer
              restarts:
                format: int32
                type: integer
              runsCreated:
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
