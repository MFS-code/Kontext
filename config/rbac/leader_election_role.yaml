apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: leader-election-manager
  namespace: kontext-system
rules:
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    resourceNames:
      - kontext.dev
    verbs:
      - get
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: leader-election-manager
  namespace: kontext-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: leader-election-manager
subjects:
  - kind: ServiceAccount
    name: controller-manager
    namespace: kontext-system
