apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: webhook-certificate-manager
  namespace: kontext-system
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - create
  - apiGroups:
      - ""
    resources:
      - secrets
    resourceNames:
      - webhook-server-cert
    verbs:
      - get
      - update
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    resourceNames:
      - kontext.dev
    verbs:
      - get
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: webhook-certificate-manager
  namespace: kontext-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: webhook-certificate-manager
subjects:
  - kind: ServiceAccount
    name: controller-manager
    namespace: kontext-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: webhook-registration-manager
rules:
  - apiGroups:
      - admissionregistration.k8s.io
    resources:
      - mutatingwebhookconfigurations
    verbs:
      - create
  - apiGroups:
      - admissionregistration.k8s.io
    resources:
      - mutatingwebhookconfigurations
    resourceNames:
      - task-agentrun-mutator.kontext.dev
    verbs:
      - get
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: webhook-registration-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: webhook-registration-manager
subjects:
  - kind: ServiceAccount
    name: controller-manager
    namespace: kontext-system
