apiVersion: v1
kind: List
items:
  - apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: kontext-controller
  - apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRole
    metadata:
      name: kontext-controller
    rules:
      - apiGroups: ["kontext.dev"]
        resources: ["agents", "agents/status", "agents/finalizers"]
        verbs: ["get", "list", "watch", "patch", "update"]
      - apiGroups: [""]
        resources: ["pods"]
        verbs: ["create", "get", "list", "watch", "delete", "patch"]
      - apiGroups: [""]
        resources: ["events"]
        verbs: ["create", "patch"]
      - apiGroups: ["apiextensions.k8s.io"]
        resources: ["customresourcedefinitions"]
        verbs: ["get", "list", "watch"]
  - apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: kontext-controller
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: kontext-controller
    subjects:
      - kind: ServiceAccount
        name: kontext-controller
        namespace: default
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: kontext-controller
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: kontext-controller
      template:
        metadata:
          labels:
            app.kubernetes.io/name: kontext-controller
        spec:
          serviceAccountName: kontext-controller
          containers:
            - name: controller
              image: kontext:dev
              imagePullPolicy: IfNotPresent
              command: ["kontext-controller"]
              env:
                - name: KONTEXT_AGENT_IMAGE
                  value: kontext:dev
