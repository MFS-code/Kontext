apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agents.kontext.dev
spec:
  group: kontext.dev
  scope: Namespaced
  names:
    plural: agents
    singular: agent
    kind: Agent
    shortNames:
      - ag
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Pod
          type: string
          jsonPath: .status.podName
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - goal
                - model
              properties:
                goal:
                  type: string
                provider:
                  type: string
                  default: anthropic
                model:
                  type: string
                tools:
                  type: array
                  items:
                    type: string
                budget:
                  type: object
                  properties:
                    tokens:
                      type: integer
                      minimum: 1
                    wallclock:
                      type: string
                    dollars:
                      type: number
                      minimum: 0
                secretRef:
                  type: object
                  properties:
                    name:
                      type: string
                replicas:
                  type: integer
                  minimum: 1
                goalTemplate:
                  type: string
                topics:
                  type: array
                  items:
                    type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                result:
                  type: string
                podName:
                  type: string
                tokensUsed:
                  type: integer
                dollarsUsed:
                  type: number
                message:
                  type: string
