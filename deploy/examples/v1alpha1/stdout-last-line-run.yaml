apiVersion: kontext.dev/v1alpha1
kind: AgentRun
metadata:
  name: stdout-last-line
spec:
  goal: Capture the final stdout line from an unmodified image.
  provider: echo
  model: fixture-model
  runtime:
    image: kontext-stdout-fixture:dev
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "ordinary workload log"
        echo "final answer from busybox"
    result:
      source: Stdout
      format: LastLine
  budget:
    wallclock: 2m
