apiVersion: kontext.dev/v1alpha1
kind: AgentRun
metadata:
  name: stdout-last-line
spec:
  goal: Capture the final stdout line from an unmodified image.
  provider: echo
  model: fixture-model
  runtime:
    image: busybox:1.36.1@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "ordinary workload log"
        echo "final answer from busybox"
    result:
      source: Stdout
      format: LastLine
  budget:
    wallclock: 2m
