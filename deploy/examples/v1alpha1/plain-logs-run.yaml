apiVersion: kontext.dev/v1alpha1
kind: AgentRun
metadata:
  name: plain-logs
spec:
  goal: Run an ordinary Linux process without structured result capture.
  provider: echo
  model: fixture-model
  runtime:
    image: busybox:1.36.1@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "ordinary image log"
        echo "no result reporter is injected"
  budget:
    wallclock: 2m
