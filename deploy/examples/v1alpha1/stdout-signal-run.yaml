apiVersion: kontext.dev/v1alpha1
kind: AgentRun
metadata:
  name: stdout-signal
spec:
  goal: Verify SIGTERM reaches an unmodified child process.
  provider: echo
  model: fixture-model
  runtime:
    image: busybox:1.36.1@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
    command: ["/bin/sh", "-c"]
    args:
      - |
        trap 'echo "signal reached child"; exit 0' TERM
        echo "waiting for signal"
        while true; do sleep 1; done
    result:
      source: Stdout
      format: LastLine
  budget:
    wallclock: 2m
