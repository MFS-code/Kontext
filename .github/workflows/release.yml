name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Check out repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version and source commit
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME}"
          core='v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)'
          prerelease_id='(0|[1-9][0-9]*|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*)'
          pattern="^${core}(-${prerelease_id}(\.${prerelease_id})*)?$"
          if [[ ! "${version}" =~ ${pattern} ]]; then
            echo "::error::release tags must use vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-PRERELEASE"
            exit 1
          fi
          if [[ "${#version}" -gt 63 ]]; then
            echo "::error::release tags must fit the 63-character Kubernetes version label"
            exit 1
          fi

          git fetch origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::release tag ${version} does not point to a commit on main"
            exit 1
          fi
          if gh release view "${version}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "::error::release ${version} already exists"
            exit 1
          fi

          echo "version=${version}" >>"${GITHUB_OUTPUT}"

  images:
    name: Publish ${{ matrix.name }}
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: operator
            package: kontext-operator
            context: .
            dockerfile: Dockerfile
          - name: echo
            package: kontext-echo
            context: runtimes/echo
            dockerfile: runtimes/echo/Dockerfile
          - name: reporter
            package: kontext-reporter
            context: .
            dockerfile: runtimes/reporter/Dockerfile
          - name: reference
            package: kontext-reference
            context: .
            dockerfile: runtimes/reference/Dockerfile
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve existing immutable image
        id: existing
        env:
          IMAGE: ghcr.io/mfs-code/${{ matrix.package }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          reference="${IMAGE}:${VERSION}"
          if ! manifest="$(
            docker buildx imagetools inspect "${reference}" \
              --format '{{json .Manifest}}' 2>/dev/null
          )"; then
            echo "exists=false" >>"${GITHUB_OUTPUT}"
            exit 0
          fi

          images="$(docker buildx imagetools inspect "${reference}" --format '{{json .Image}}')"
          for platform in linux/amd64 linux/arm64; do
            revision="$(
              jq -r \
                --arg platform "${platform}" \
                '.[$platform].config.Labels["org.opencontainers.image.revision"] // empty' \
                <<<"${images}"
            )"
            if [[ "${revision}" != "${GITHUB_SHA}" ]]; then
              echo "::error::${reference} already exists for revision ${revision:-unknown}; release tags are immutable"
              exit 1
            fi
          done

          echo "exists=true" >>"${GITHUB_OUTPUT}"
          echo "digest=$(jq -r '.digest' <<<"${manifest}")" >>"${GITHUB_OUTPUT}"

      - name: Build and push multi-arch image
        id: build
        if: steps.existing.outputs.exists != 'true'
        uses: ./.github/actions/build-image
        with:
          context: ${{ matrix.context }}
          dockerfile: ${{ matrix.dockerfile }}
          tags: ghcr.io/mfs-code/${{ matrix.package }}:${{ needs.validate.outputs.version }}
          cache-scope: release-${{ matrix.name }}
          load: "false"
          push: "true"
          platforms: linux/amd64,linux/arm64
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.validate.outputs.version }}
            org.opencontainers.image.licenses=MIT

      - name: Make package public
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_TOKEN || github.token }}
          PACKAGE: ${{ matrix.package }}
          OWNER_TYPE: ${{ github.event.repository.owner.type }}
        run: |
          if [[ "${OWNER_TYPE}" == "Organization" ]]; then
            endpoint="orgs/${GITHUB_REPOSITORY_OWNER}/packages/container/${PACKAGE}"
          else
            endpoint="user/packages/container/${PACKAGE}"
          fi

          for attempt in 1 2 3 4 5; do
            if gh api --method PATCH "${endpoint}" --field visibility=public >/dev/null &&
              [[ "$(gh api "${endpoint}" --jq .visibility)" == "public" ]]; then
              exit 0
            fi
            if [[ "${attempt}" -lt 5 ]]; then
              sleep $((attempt * 2))
            fi
          done
          echo "::error::could not make ghcr.io/mfs-code/${PACKAGE} public"
          exit 1

      - name: Verify anonymous multi-arch pull
        env:
          IMAGE: ghcr.io/mfs-code/${{ matrix.package }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          docker logout ghcr.io
          manifest="$(docker buildx imagetools inspect "${IMAGE}:${VERSION}")"
          [[ "${manifest}" == *"linux/amd64"* ]]
          [[ "${manifest}" == *"linux/arm64"* ]]

      - name: Record immutable image reference
        env:
          DIGEST: ${{ steps.existing.outputs.digest || steps.build.outputs.digest }}
          IMAGE: ghcr.io/mfs-code/${{ matrix.package }}
          IMAGE_NAME: ${{ matrix.name }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          mkdir -p image-metadata
          jq -n \
            --arg name "${IMAGE_NAME}" \
            --arg image "${IMAGE}" \
            --arg tag "${VERSION}" \
            --arg digest "${DIGEST}" \
            '{
              name: $name,
              image: $image,
              tag: $tag,
              reference: ($image + ":" + $tag),
              digest: $digest,
              immutableReference: ($image + "@" + $digest),
              platforms: ["linux/amd64", "linux/arm64"]
            }' >"image-metadata/${IMAGE_NAME}.json"

      - name: Upload image metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-image-${{ matrix.name }}
          path: image-metadata/${{ matrix.name }}.json
          if-no-files-found: error
          retention-days: 7

  manifest:
    name: Build release artifacts
    needs:
      - validate
      - images
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Download image metadata
        uses: actions/download-artifact@v4
        with:
          pattern: release-image-*
          path: image-metadata
          merge-multiple: true

      - name: Assemble digest manifest
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          jq -s \
            --arg releaseTag "${VERSION}" \
            '{
              apiVersion: "kontext.dev/release-images/v1alpha1",
              releaseTag: $releaseTag,
              controlPlaneAPI: "kontext.dev/v1alpha1",
              images: sort_by(.name)
            }' image-metadata/*.json >image-digests.json

      - name: Render pinned install manifest
        run: |
          make release-manifest IMAGE_DIGESTS=image-digests.json
          kubectl create --dry-run=client -f dist/install.yaml -o name

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            image-digests.json
            dist/install.yaml
          if-no-files-found: error
          retention-days: 7

  verify-install:
    name: Verify registry install, upgrade, and uninstall
    needs:
      - validate
      - manifest
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      KIND_CLUSTER_NAME: kontext-release-verification
      KONTEXT_DIAG_DIR: ${{ github.workspace }}/.ci-diagnostics
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download current release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Create clean kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}
          wait: 120s

      - name: Download previous release manifest when available
        id: previous
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          previous="$(
            gh release list \
              --repo "${GITHUB_REPOSITORY}" \
              --exclude-drafts \
              --limit 100 \
              --json tagName,publishedAt \
              --jq 'sort_by(.publishedAt) | last | .tagName // ""'
          )"
          if [[ -z "${previous}" ]]; then
            echo "available=false" >>"${GITHUB_OUTPUT}"
            exit 0
          fi

          mkdir -p previous-release
          if ! gh release download "${previous}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern install.yaml \
            --dir previous-release; then
            echo "::warning::previous release ${previous} has no install manifest; skipping cross-version upgrade"
            echo "available=false" >>"${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "available=true" >>"${GITHUB_OUTPUT}"
          echo "version=${previous}" >>"${GITHUB_OUTPUT}"

      - name: Verify release lifecycle
        env:
          CURRENT_VERSION: ${{ needs.validate.outputs.version }}
          HAS_PREVIOUS: ${{ steps.previous.outputs.available }}
          PREVIOUS_VERSION: ${{ steps.previous.outputs.version }}
        run: |
          args=(
            release-assets/dist/install.yaml
            "${CURRENT_VERSION}"
          )
          if [[ "${HAS_PREVIOUS}" == "true" ]]; then
            args+=(
              previous-release/install.yaml
              "${PREVIOUS_VERSION}"
            )
          fi
          ./scripts/verify-release-install.sh "${args[@]}"

      - name: Collect diagnostics on failure
        if: failure()
        run: ./scripts/collect-kind-diagnostics.sh "${KONTEXT_DIAG_DIR}"

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-install-diagnostics-${{ github.run_id }}
          path: ${{ env.KONTEXT_DIAG_DIR }}
          if-no-files-found: ignore

      - name: Delete kind cluster
        if: always()
        run: kind delete cluster --name "${KIND_CLUSTER_NAME}" || true

  release:
    name: Create GitHub release
    needs:
      - validate
      - manifest
      - verify-install
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download verified release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          flags=()
          if [[ "${VERSION}" == *-* ]]; then
            flags+=(--prerelease)
          fi
          gh release create "${VERSION}" \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --title "Kontext ${VERSION}" \
            --notes "Install with: kubectl apply -f https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/install.yaml. See image-digests.json for immutable image references. This release serves the kontext.dev/v1alpha1 API." \
            "${flags[@]}" \
            release-assets/image-digests.json \
            release-assets/dist/install.yaml
