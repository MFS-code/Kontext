name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  actions: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache controller tools
        uses: actions/cache@v4
        with:
          path: bin
          key: ${{ runner.os }}-controller-tools-${{ hashFiles('Makefile', 'go.mod', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-controller-tools-

      - name: Verify generated artifacts and formatting
        run: make verify

      - name: Run unit and envtest suites
        run: make test

      - name: Scan for known Go vulnerabilities
        run: make vulncheck

  # Build optional runtime images independently so Dockerfile breakage is
  # visible even when a specific image is not exercised by every kind scenario.
  image-smoke:
    name: Image smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      KONTEXT_ANTHROPIC_IMAGE: kontext-runtime-anthropic:dev
      KONTEXT_REPORTER_IMAGE: kontext-reporter:dev
      KONTEXT_REFERENCE_IMAGE: kontext-reference:dev
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build reusable reporter image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runtimes/reporter/Dockerfile
          push: false
          load: true
          tags: ${{ env.KONTEXT_REPORTER_IMAGE }}
          cache-from: type=gha,scope=reporter
          cache-to: type=gha,mode=max,scope=reporter

      - name: Build model-agnostic reference runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runtimes/reference/Dockerfile
          push: false
          load: true
          tags: ${{ env.KONTEXT_REFERENCE_IMAGE }}
          cache-from: type=gha,scope=reference
          cache-to: type=gha,mode=max,scope=reference

      - name: Smoke test reference runtime execution
        run: |
          success_output="$(
            docker run --rm \
              -e KONTEXT_TERMINATION_MESSAGE=/dev/null \
              -e KONTEXT_GOAL='CI fake success' \
              -e KONTEXT_PROVIDER=fake \
              -e KONTEXT_MODEL='opaque/ci-model' \
              "${KONTEXT_REFERENCE_IMAGE}"
          )"
          [[ "${success_output}" == *'"apiVersion":"kontext.dev/event/v1alpha1"'* ]]
          [[ "${success_output}" == *'KONTEXT_RESULT:'* ]]

          tool_output="$(
            docker run --rm \
              -e KONTEXT_TERMINATION_MESSAGE=/dev/null \
              -e KONTEXT_GOAL='CI shell tool' \
              -e KONTEXT_PROVIDER=fake \
              -e KONTEXT_MODEL='opaque/ci-model' \
              -e KONTEXT_TOOLS=shell \
              -e KONTEXT_FAKE_SCENARIO=tool \
              -e KONTEXT_FAKE_TOOL_NAME=shell \
              -e 'KONTEXT_FAKE_TOOL_ARGUMENTS={"command":"ls /bin >/dev/null && printf tool-ok","working_directory":"/tmp"}' \
              -e KONTEXT_MAX_TURNS=3 \
              -e KONTEXT_MAX_TOOL_CALLS=2 \
              "${KONTEXT_REFERENCE_IMAGE}"
          )"
          [[ "${tool_output}" == *'"type":"tool"'* ]]
          [[ "${tool_output}" == *'tool-ok'* ]]
          [[ "${tool_output}" == *'"toolCalls":1'* ]]

          set +e
          failure_output="$(
            docker run --rm \
              -e KONTEXT_TERMINATION_MESSAGE=/dev/null \
              -e KONTEXT_GOAL='CI fake failure' \
              -e KONTEXT_PROVIDER=fake \
              -e KONTEXT_MODEL='opaque/ci-model' \
              -e KONTEXT_FAKE_SCENARIO=failure \
              "${KONTEXT_REFERENCE_IMAGE}"
          )"
          failure_code=$?
          set -e
          [[ "${failure_code}" -eq 1 ]]
          [[ "${failure_output}" == *'"outcome":"Failed"'* ]]

      - name: Build Anthropic reference runtime image
        uses: docker/build-push-action@v6
        with:
          context: runtimes/python-anthropic
          push: false
          load: true
          tags: ${{ env.KONTEXT_ANTHROPIC_IMAGE }}
          cache-from: type=gha,scope=anthropic
          cache-to: type=gha,mode=max,scope=anthropic

  e2e:
    name: Kind e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - validate
      - image-smoke
    env:
      KIND_CLUSTER_NAME: kontext-ci
      KONTEXT_OPERATOR_IMAGE: kontext-operator:dev
      KONTEXT_ECHO_IMAGE: kontext-echo:dev
      KONTEXT_REPORTER_IMAGE: kontext-reporter:dev
      KONTEXT_REFERENCE_IMAGE: kontext-reference:dev
      KONTEXT_STDOUT_FIXTURE_IMAGE: kontext-stdout-fixture:dev
      KONTEXT_DIAG_DIR: ${{ github.workspace }}/.ci-diagnostics
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build operator image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.KONTEXT_OPERATOR_IMAGE }}
          cache-from: type=gha,scope=operator
          cache-to: type=gha,mode=max,scope=operator

      - name: Build echo runtime image
        uses: docker/build-push-action@v6
        with:
          context: runtimes/echo
          push: false
          load: true
          tags: ${{ env.KONTEXT_ECHO_IMAGE }}
          cache-from: type=gha,scope=echo
          cache-to: type=gha,mode=max,scope=echo

      - name: Build reusable reporter image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runtimes/reporter/Dockerfile
          push: false
          load: true
          tags: ${{ env.KONTEXT_REPORTER_IMAGE }}
          cache-from: type=gha,scope=reporter
          cache-to: type=gha,mode=max,scope=reporter

      - name: Build model-agnostic reference runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runtimes/reference/Dockerfile
          push: false
          load: true
          tags: ${{ env.KONTEXT_REFERENCE_IMAGE }}
          cache-from: type=gha,scope=reference
          cache-to: type=gha,mode=max,scope=reference

      - name: Build stdout-capture fixture image
        uses: docker/build-push-action@v6
        with:
          context: runtimes/stdout-fixture
          push: false
          load: true
          tags: ${{ env.KONTEXT_STDOUT_FIXTURE_IMAGE }}
          cache-from: type=gha,scope=stdout-fixture
          cache-to: type=gha,mode=max,scope=stdout-fixture

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}
          wait: 120s

      - name: Install Kontext with local images
        run: ./scripts/install-go-kind.sh

      - name: Run keyless kind end-to-end scenarios
        run: ./scripts/e2e-kind.sh

      - name: Collect diagnostics on failure
        if: failure()
        run: ./scripts/collect-kind-diagnostics.sh "${KONTEXT_DIAG_DIR}"

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kind-diagnostics-${{ github.run_id }}
          path: ${{ env.KONTEXT_DIAG_DIR }}
          if-no-files-found: ignore

      - name: Delete kind cluster
        if: always()
        run: kind delete cluster --name "${KIND_CLUSTER_NAME}" || true

  # kindnet does not enforce NetworkPolicy. This focused job installs pinned,
  # checksum-verified Calico before treating connectivity results as evidence.
  network-policy-e2e:
    name: Kind NetworkPolicy e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - validate
    env:
      KIND_CLUSTER_NAME: kontext-network-policy-ci
      KONTEXT_OPERATOR_IMAGE: kontext-operator:dev
      KONTEXT_REPORTER_IMAGE: kontext-reporter:dev
      KONTEXT_REFERENCE_IMAGE: kontext-reference:dev
      KONTEXT_DIAG_DIR: ${{ github.workspace }}/.ci-diagnostics
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build operator image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.KONTEXT_OPERATOR_IMAGE }}
          cache-from: type=gha,scope=network-policy-operator
          cache-to: type=gha,mode=max,scope=network-policy-operator

      - name: Build reusable reporter image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runtimes/reporter/Dockerfile
          push: false
          load: true
          tags: ${{ env.KONTEXT_REPORTER_IMAGE }}
          cache-from: type=gha,scope=network-policy-reporter
          cache-to: type=gha,mode=max,scope=network-policy-reporter

      - name: Build model-agnostic reference runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runtimes/reference/Dockerfile
          push: false
          load: true
          tags: ${{ env.KONTEXT_REFERENCE_IMAGE }}
          cache-from: type=gha,scope=network-policy-reference
          cache-to: type=gha,mode=max,scope=network-policy-reference

      - name: Run Calico NetworkPolicy acceptance
        run: ./scripts/e2e-kind-network-policy.sh

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: network-policy-diagnostics-${{ github.run_id }}
          path: ${{ env.KONTEXT_DIAG_DIR }}
          if-no-files-found: ignore

      - name: Delete kind cluster
        if: always()
        run: kind delete cluster --name "${KIND_CLUSTER_NAME}" || true
