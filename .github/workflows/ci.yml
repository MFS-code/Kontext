name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache controller tools
        uses: actions/cache@v4
        with:
          path: bin
          key: ${{ runner.os }}-controller-tools-${{ hashFiles('Makefile', 'go.mod', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-controller-tools-

      - name: Verify generated artifacts and formatting
        run: make verify

      - name: Run unit and envtest suites
        run: make test

      - name: Scan for known Go vulnerabilities
        run: make vulncheck

  # Smoke maintained support and runtime images independently before kind.
  image-smoke:
    name: Image smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      KONTEXT_REPORTER_IMAGE: kontext-reporter:dev
      KONTEXT_REFERENCE_IMAGE: kontext-reference:dev
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build reusable reporter image
        uses: ./.github/actions/build-image
        with:
          context: .
          dockerfile: runtimes/reporter/Dockerfile
          tags: ${{ env.KONTEXT_REPORTER_IMAGE }}
          cache-scope: reporter
          load: "true"

      - name: Build model-agnostic reference runtime image
        uses: ./.github/actions/build-image
        with:
          context: .
          dockerfile: runtimes/reference/Dockerfile
          tags: ${{ env.KONTEXT_REFERENCE_IMAGE }}
          cache-scope: reference
          load: "true"

      - name: Smoke test reference runtime execution
        run: |
          success_output="$(
            docker run --rm \
              -e KONTEXT_TERMINATION_MESSAGE=/dev/null \
              -e KONTEXT_GOAL='CI fake success' \
              -e KONTEXT_PROVIDER=fake \
              -e KONTEXT_MODEL='opaque/ci-model' \
              "${KONTEXT_REFERENCE_IMAGE}"
          )"
          [[ "${success_output}" == *'"apiVersion":"kontext.dev/event/v1alpha1"'* ]]
          [[ "${success_output}" == *'KONTEXT_RESULT:'* ]]

          tool_output="$(
            docker run --rm \
              -e KONTEXT_TERMINATION_MESSAGE=/dev/null \
              -e KONTEXT_GOAL='CI shell tool' \
              -e KONTEXT_PROVIDER=fake \
              -e KONTEXT_MODEL='opaque/ci-model' \
              -e KONTEXT_TOOLS=shell \
              -e KONTEXT_FAKE_SCENARIO=tool \
              -e KONTEXT_FAKE_TOOL_NAME=shell \
              -e 'KONTEXT_FAKE_TOOL_ARGUMENTS={"command":"ls /bin >/dev/null && printf tool-ok","working_directory":"/tmp"}' \
              -e KONTEXT_MAX_TURNS=3 \
              -e KONTEXT_MAX_TOOL_CALLS=2 \
              "${KONTEXT_REFERENCE_IMAGE}"
          )"
          [[ "${tool_output}" == *'"type":"tool"'* ]]
          [[ "${tool_output}" == *'tool-ok'* ]]
          [[ "${tool_output}" == *'"toolCalls":1'* ]]

          set +e
          failure_output="$(
            docker run --rm \
              -e KONTEXT_TERMINATION_MESSAGE=/dev/null \
              -e KONTEXT_GOAL='CI fake failure' \
              -e KONTEXT_PROVIDER=fake \
              -e KONTEXT_MODEL='opaque/ci-model' \
              -e KONTEXT_FAKE_SCENARIO=failure \
              "${KONTEXT_REFERENCE_IMAGE}"
          )"
          failure_code=$?
          set -e
          [[ "${failure_code}" -eq 1 ]]
          [[ "${failure_output}" == *'"outcome":"Failed"'* ]]

  e2e:
    name: Kind e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - validate
      - image-smoke
    env:
      KIND_CLUSTER_NAME: kontext-ci
      KONTEXT_OPERATOR_IMAGE: kontext-operator:dev
      KONTEXT_ECHO_IMAGE: kontext-echo:dev
      KONTEXT_REPORTER_IMAGE: kontext-reporter:dev
      KONTEXT_REFERENCE_IMAGE: kontext-reference:dev
      KONTEXT_STDOUT_FIXTURE_IMAGE: kontext-stdout-fixture:dev
      KONTEXT_DIAG_DIR: ${{ github.workspace }}/.ci-diagnostics
      KONTEXT_EVAL_DIR: ${{ github.workspace }}/.ci-evals
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize keyless evaluation artifact
        run: |
          mkdir -p "${KONTEXT_EVAL_DIR}"
          marker="${KONTEXT_EVAL_DIR}/not-run.json"
          temporary="${marker}.tmp"
          jq -n \
            --arg commitSHA "${GITHUB_SHA:0:64}" \
            --arg runAttempt "${GITHUB_RUN_ATTEMPT:0:32}" \
            --arg runID "${GITHUB_RUN_ID:0:128}" \
            '{
              apiVersion: "kontext.dev/eval/v1alpha1",
              kind: "EvalRunMarker",
              suite: "keyless",
              state: "NotRun",
              failureStage: "workflow_not_started",
              commitSHA: $commitSHA,
              runID: $runID,
              runAttempt: $runAttempt,
              pass: false
            }' >"${temporary}"
          mv "${temporary}" "${marker}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build kind images
        uses: ./.github/actions/build-core-images
        with:
          image-set: full
          cache-scope: ""

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}
          wait: 120s

      - name: Install Kontext with local images
        run: ./scripts/install-go-kind.sh

      - name: Run keyless kind end-to-end scenarios
        run: ./scripts/e2e-kind.sh

      - name: Run keyless evaluation acceptance
        run: ./scripts/eval-kind.sh

      - name: Upload keyless evaluation records
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keyless-evals-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.KONTEXT_EVAL_DIR }}
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 5

      - name: Preserve diagnostics
        if: failure()
        uses: ./.github/actions/kind-diagnostics
        with:
          diagnostics-dir: ${{ env.KONTEXT_DIAG_DIR }}
          artifact-name: kind-diagnostics-${{ github.run_id }}

      - name: Delete kind cluster
        if: always()
        run: kind delete cluster --name "${KIND_CLUSTER_NAME}" || true

  # kindnet does not enforce NetworkPolicy. This focused job installs pinned,
  # checksum-verified Calico before treating connectivity results as evidence.
  network-policy-e2e:
    name: Kind NetworkPolicy e2e
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs:
      - validate
    env:
      KIND_CLUSTER_NAME: kontext-network-policy-ci
      KONTEXT_OPERATOR_IMAGE: kontext-operator:dev
      KONTEXT_REPORTER_IMAGE: kontext-reporter:dev
      KONTEXT_REFERENCE_IMAGE: kontext-reference:dev
      KONTEXT_DIAG_DIR: ${{ github.workspace }}/.ci-diagnostics
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build NetworkPolicy images
        uses: ./.github/actions/build-core-images
        with:
          image-set: network-policy
          cache-scope: network-policy-

      - name: Run Calico NetworkPolicy acceptance
        run: ./scripts/e2e-kind-network-policy.sh

      - name: Preserve diagnostics
        if: failure()
        uses: ./.github/actions/kind-diagnostics
        with:
          diagnostics-dir: ${{ env.KONTEXT_DIAG_DIR }}
          artifact-name: network-policy-diagnostics-${{ github.run_id }}
          collect: "false"

      - name: Delete kind cluster
        if: always()
        run: kind delete cluster --name "${KIND_CLUSTER_NAME}" || true
