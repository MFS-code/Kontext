name: Provider acceptance

on:
  workflow_dispatch:
    inputs:
      provider:
        description: Maintained provider transport
        required: true
        type: choice
        options:
          - anthropic
          - openai
          - openai-compatible
      scenario:
        description: Tiny acceptance path (tool uses two provider requests)
        required: true
        default: tool
        type: choice
        options:
          - tool
          - text
      model:
        description: Provider model identifier (passed through unchanged)
        required: true
        type: string
      endpoint:
        description: Optional exact endpoint (never include credentials)
        required: false
        type: string

permissions:
  contents: read

jobs:
  provider:
    name: ${{ inputs.provider }} ${{ inputs.scenario }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: provider-acceptance
    env:
      KIND_CLUSTER_NAME: provider-acceptance
      KONTEXT_ACCEPTANCE_NAMESPACE: provider-acceptance
      KONTEXT_ACCEPTANCE_SCENARIO: ${{ inputs.scenario }}
      KONTEXT_KIND_IMAGE_SET: network-policy
      KONTEXT_OPERATOR_IMAGE: kontext-operator:dev
      KONTEXT_REPORTER_IMAGE: kontext-reporter:dev
      KONTEXT_REFERENCE_IMAGE: kontext-reference:dev
      KONTEXT_PROVIDER: ${{ inputs.provider }}
      KONTEXT_MODEL: ${{ inputs.model }}
      KONTEXT_PROVIDER_ENDPOINT: ${{ inputs.endpoint }}
      # runner.* is unavailable in job-level env; keep the record under the workspace.
      KONTEXT_ACCEPTANCE_RECORD: ${{ github.workspace }}/.provider-evals/acceptance.json
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize provider acceptance record
        env:
          KONTEXT_ACCEPTANCE_INITIALIZE_ONLY: "true"
        run: ./scripts/provider-acceptance-kind.sh

      - name: Validate provider selection
        run: |
          case "${KONTEXT_PROVIDER}" in
            anthropic|openai|openai-compatible) ;;
            *)
              echo "unsupported acceptance provider: ${KONTEXT_PROVIDER}" >&2
              exit 1
              ;;
          esac

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build maintained images
        uses: ./.github/actions/build-core-images
        with:
          image-set: network-policy
          cache-scope: provider-acceptance-

      - name: Create ephemeral kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}
          wait: 120s

      - name: Install Kontext with maintained images
        run: ./scripts/install-go-kind.sh

      - name: Run Anthropic acceptance
        if: inputs.provider == 'anthropic'
        env:
          KONTEXT_PROVIDER_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: ./scripts/provider-acceptance-kind.sh

      - name: Run OpenAI-compatible acceptance
        if: inputs.provider == 'openai' || inputs.provider == 'openai-compatible'
        env:
          KONTEXT_PROVIDER_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: ./scripts/provider-acceptance-kind.sh

      - name: Upload provider acceptance record
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-acceptance-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.KONTEXT_ACCEPTANCE_RECORD }}
          if-no-files-found: error
          retention-days: 3

      - name: Preserve redacted failure diagnostics
        if: failure()
        uses: ./.github/actions/kind-diagnostics
        with:
          diagnostics-dir: ${{ runner.temp }}/provider-diagnostics
          artifact-name: provider-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          redact-workloads: "true"
          retention-days: 3

      - name: Delete kind cluster
        if: always()
        run: kind delete cluster --name "${KIND_CLUSTER_NAME}" || true
